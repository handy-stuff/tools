<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handy Tools</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --border: #e2e6ea;
      --border-hover: #c4cdd5;
      --text: #1c2127;
      --text-muted: #637381;
      --text-faint: #919eab;
      --primary: #1a56db;
      --primary-light: #eef2ff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-hover: 0 6px 20px rgba(0,0,0,0.08);
      --transition: 200ms ease;
      --font: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 20px 40px;
      flex: 1;
    }

    /* ---- Header ---- */
    .page-header {
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header h1 svg {
      color: var(--primary);
      flex-shrink: 0;
    }

    .page-header p {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 6px;
      padding-left: 48px;
    }

    /* ---- Tools Grid ---- */
    .tools-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      transition: all var(--transition);
      cursor: pointer;
    }

    .tool-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }

    .tool-card:hover .tool-icon {
      background: var(--primary);
      color: #fff;
    }

    .tool-card:hover .tool-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .tool-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--primary);
      flex-shrink: 0;
      transition: all var(--transition);
    }

    .tool-info {
      flex: 1;
      min-width: 0;
    }

    .tool-name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }

    .tool-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .tool-arrow {
      color: var(--text-faint);
      flex-shrink: 0;
      opacity: 0;
      transform: translateX(-4px);
      transition: all var(--transition);
    }

    /* Coming soon */
    .tool-card.coming-soon {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }

    .tool-card.coming-soon .tool-icon {
      background: #f0f1f3;
      color: var(--text-faint);
    }

    .coming-soon-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-faint);
      background: #f0f1f3;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* ---- Responsive ---- */
    @media (max-width: 480px) {
      .container { padding: 32px 16px 32px; }
      .page-header h1 { font-size: 22px; }
      .page-header p { padding-left: 0; margin-top: 8px; }
      .tool-card { padding: 16px 18px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="page-header">
      <h1>
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="2" y="2" width="32" height="32" rx="8" stroke="currentColor" stroke-width="2.5"/>
          <rect x="8" y="8" width="8" height="8" rx="2" fill="currentColor" opacity="0.7"/>
          <rect x="20" y="8" width="8" height="8" rx="2" fill="currentColor" opacity="0.4"/>
          <rect x="8" y="20" width="8" height="8" rx="2" fill="currentColor" opacity="0.4"/>
          <rect x="20" y="20" width="8" height="8" rx="2" fill="currentColor" opacity="0.2"/>
        </svg>
        Handy Tools
      </h1>
      <p>Quick utilities to get things done</p>
    </header>

    <!-- Tools List -->
    <div class="tools-grid">

      <!-- Timesheet Calculator — LIVE -->
      <a href="tools/timesheet-calculator/index.html" class="tool-card" data-testid="card-timesheet">
        <div class="tool-icon">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
            <rect x="2" y="4" width="28" height="24" rx="3" stroke="currentColor" stroke-width="2"/>
            <line x1="2" y1="12" x2="30" y2="12" stroke="currentColor" stroke-width="2"/>
            <line x1="10" y1="4" x2="10" y2="28" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <line x1="20" y1="4" x2="20" y2="28" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <circle cx="24" cy="20" r="3" fill="currentColor" opacity="0.5"/>
          </svg>
        </div>
        <div class="tool-info">
          <div class="tool-name">Timesheet Calculator</div>
          <div class="tool-desc">Track work hours, calculate totals, and save as PDF</div>
        </div>
        <div class="tool-arrow">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 4l6 6-6 6"/></svg>
        </div>
      </a>

      <!-- Money Calculator — COMING SOON -->
      <div class="tool-card coming-soon" data-testid="card-money">
        <div class="tool-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
          </svg>
        </div>
        <div class="tool-info">
          <div class="tool-name">Money Calculator</div>
          <div class="tool-desc">Budget tracking, currency conversion, and expense splits</div>
        </div>
        <span class="coming-soon-badge">Coming Soon</span>
      </div>

      <!-- More tools placeholder — COMING SOON -->
      <div class="tool-card coming-soon" data-testid="card-more">
        <div class="tool-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
          </svg>
        </div>
        <div class="tool-info">
          <div class="tool-name">More Tools</div>
          <div class="tool-desc">New tools will be added here</div>
        </div>
        <span class="coming-soon-badge">Coming Soon</span>
      </div>

    </div>
  </div>

</body>
</html>
